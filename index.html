<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Signal v13">
<!-- 캐시 무효화: 매번 최신 index.html 받기 (service-worker가 정적 자산 캐시) -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="manifest" href="manifest.json?v=13">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Market Signal v13</title>
<!-- APP_VERSION: 변경 시 service-worker가 자동 갱신 감지 -->
<meta name="app-version" content="13.2.0">
<style>
/* ──────────────────────────────────────────────────────────
   Reset + Base
   ────────────────────────────────────────────────────────── */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overscroll-behavior-y: contain; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
  background: linear-gradient(180deg, #0f172a 0%, #020617 100%);
  color: #e2e8f0;
  font-size: 15px;
  line-height: 1.45;
  min-height: 100vh;
  padding-bottom: 88px;
  -webkit-font-smoothing: antialiased;
}

/* ──────────────────────────────────────────────────────────
   Header
   ────────────────────────────────────────────────────────── */
header {
  position: sticky; top: 0; z-index: 90;
  background: rgba(15, 23, 42, 0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 14px 16px 10px;
  border-bottom: 1px solid rgba(148, 163, 184, 0.12);
}
.header-row { display: flex; justify-content: space-between; align-items: center; }
.title { font-size: 17px; font-weight: 700; letter-spacing: -0.2px; }
.title .v { color: #64748b; font-weight: 500; font-size: 13px; margin-left: 4px; }
.actions { display: flex; gap: 8px; }
.icon-btn {
  width: 36px; height: 36px; border-radius: 10px;
  background: rgba(148, 163, 184, 0.1);
  color: #cbd5e1; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: all 0.15s;
}
.icon-btn:active { transform: scale(0.92); background: rgba(148, 163, 184, 0.2); }
.last-update { font-size: 11px; color: #64748b; margin-top: 4px; }
.last-update.fresh { color: #10b981; }
.last-update.stale { color: #f59e0b; }
.last-update.error { color: #ef4444; }

/* ──────────────────────────────────────────────────────────
   Tabs
   ────────────────────────────────────────────────────────── */
.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: rgba(15, 23, 42, 0.96);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid rgba(148, 163, 184, 0.12);
  padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px;
}
.tab {
  background: none; border: none; cursor: pointer;
  padding: 8px 4px; color: #64748b;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 500;
  transition: color 0.15s;
}
.tab .tab-icon { font-size: 20px; line-height: 1; }
.tab.active { color: #e2e8f0; }
.tab.active .tab-icon { transform: scale(1.05); }
.tab-page { display: none; padding: 16px; max-width: 720px; margin: 0 auto; }
.tab-page.active { display: block; }

/* ──────────────────────────────────────────────────────────
   Cards
   ────────────────────────────────────────────────────────── */
.card {
  background: rgba(30, 41, 59, 0.5);
  border: 1px solid rgba(148, 163, 184, 0.1);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 14px;
  backdrop-filter: blur(8px);
}
.card-title {
  font-size: 12px;
  font-weight: 600;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
  display: flex; justify-content: space-between; align-items: center;
}
.card-hint { font-size: 11px; color: #64748b; font-weight: 400; text-transform: none; letter-spacing: 0; }

/* ──────────────────────────────────────────────────────────
   Status Big Display
   ────────────────────────────────────────────────────────── */
.status-big {
  text-align: center;
  padding: 20px 16px;
  border-radius: 20px;
  margin-bottom: 16px;
  position: relative; overflow: hidden;
}
.status-big::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at center, currentColor 0%, transparent 70%);
  opacity: 0.08;
}
.status-emoji { font-size: 44px; margin-bottom: 8px; }
.status-level { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
.status-sub { font-size: 13px; color: #94a3b8; margin-top: 6px; }

.level-CRASH_BUY, .level-PANIC_BUY { background: rgba(16, 185, 129, 0.15); color: #10b981; }
.level-STRONG_BUY, .level-SHIFT_UP { background: rgba(34, 197, 94, 0.12); color: #22c55e; }
.level-BUY, .level-CAUTION_UP { background: rgba(132, 204, 22, 0.1); color: #84cc16; }
.level-WATCH { background: rgba(250, 204, 21, 0.1); color: #facc15; }
.level-NEUTRAL { background: rgba(148, 163, 184, 0.1); color: #cbd5e1; }
.level-CAUTION { background: rgba(251, 146, 60, 0.12); color: #fb923c; }
.level-CAUTION_DOWN { background: rgba(249, 115, 22, 0.12); color: #f97316; }
.level-WARNING { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
.level-SHIFT_DOWN { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
.level-STRONG_SELL { background: rgba(220, 38, 38, 0.18); color: #dc2626; }

/* ──────────────────────────────────────────────────────────
   Conflict Banner
   ────────────────────────────────────────────────────────── */
.conflict-banner {
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 14px;
  display: flex; align-items: flex-start; gap: 12px;
  border: 1px solid;
}
.conflict-banner .cb-icon { font-size: 22px; flex-shrink: 0; }
.conflict-banner .cb-body { flex: 1; }
.conflict-banner .cb-title { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
.conflict-banner .cb-desc { font-size: 12px; color: #cbd5e1; line-height: 1.4; }
.conflict-good { background: rgba(16, 185, 129, 0.08); border-color: rgba(16, 185, 129, 0.3); }
.conflict-good .cb-title { color: #10b981; }
.conflict-warn { background: rgba(251, 146, 60, 0.08); border-color: rgba(251, 146, 60, 0.3); }
.conflict-warn .cb-title { color: #fb923c; }
.conflict-danger { background: rgba(239, 68, 68, 0.08); border-color: rgba(239, 68, 68, 0.3); }
.conflict-danger .cb-title { color: #ef4444; }
.conflict-info { background: rgba(148, 163, 184, 0.06); border-color: rgba(148, 163, 184, 0.2); }
.conflict-info .cb-title { color: #cbd5e1; }

/* ──────────────────────────────────────────────────────────
   Summary 2-column
   ────────────────────────────────────────────────────────── */
.summary-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 16px;
}
.summary-cell {
  background: rgba(30, 41, 59, 0.5);
  border: 1px solid rgba(148, 163, 184, 0.1);
  border-radius: 14px;
  padding: 12px;
  cursor: pointer;
}
.summary-cell .sc-label { font-size: 11px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
.summary-cell .sc-level { font-size: 20px; font-weight: 800; margin-top: 6px; letter-spacing: -0.5px; }
.summary-cell .sc-meta { font-size: 11px; color: #94a3b8; margin-top: 4px; }

/* ──────────────────────────────────────────────────────────
   Triggers list
   ────────────────────────────────────────────────────────── */
.trigger-list { display: flex; flex-direction: column; gap: 8px; }
.trigger-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  background: rgba(15, 23, 42, 0.4);
  border: 1px solid rgba(148, 163, 184, 0.08);
  border-radius: 10px;
  font-size: 13px;
}
.trigger-pill { 
  flex-shrink: 0;
  font-size: 10px; font-weight: 700;
  padding: 2px 6px; border-radius: 4px;
  background: rgba(148, 163, 184, 0.15); color: #94a3b8;
}
.trigger-pill.buy { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
.trigger-pill.sell { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
.trigger-name { flex: 1; color: #cbd5e1; }
.trigger-weight { font-size: 11px; color: #64748b; font-weight: 600; }
.empty-state { text-align: center; padding: 24px 16px; color: #64748b; font-size: 13px; }

/* ──────────────────────────────────────────────────────────
   Indicators
   ────────────────────────────────────────────────────────── */
.indicator-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.indicator-item {
  background: rgba(15, 23, 42, 0.4);
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid rgba(148, 163, 184, 0.08);
}
.indicator-label { font-size: 11px; color: #64748b; }
.indicator-value { font-size: 16px; font-weight: 700; color: #e2e8f0; margin-top: 2px; }
.indicator-value.pos { color: #22c55e; }
.indicator-value.neg { color: #ef4444; }
.indicator-value.warn { color: #fb923c; }

/* ──────────────────────────────────────────────────────────
   Pillars (단기)
   ────────────────────────────────────────────────────────── */
.pillar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.pillar-cell {
  text-align: center;
  background: rgba(15, 23, 42, 0.4);
  padding: 12px 6px;
  border-radius: 10px;
  border: 1px solid rgba(148, 163, 184, 0.08);
}
.pillar-letter { font-size: 14px; font-weight: 800; color: #94a3b8; margin-bottom: 4px; }
.pillar-score { font-size: 20px; font-weight: 800; }
.pillar-score.s0 { color: #64748b; }
.pillar-score.s1 { color: #facc15; }
.pillar-score.s2 { color: #fb923c; }
.pillar-score.s3 { color: #ef4444; }
.pillar-label { font-size: 9px; color: #64748b; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.3px; }

/* ──────────────────────────────────────────────────────────
   Alerts (컨텍스트)
   ────────────────────────────────────────────────────────── */
.alert-item {
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 10px;
  border: 1px solid;
  display: flex; align-items: flex-start; gap: 12px;
}
.alert-icon { font-size: 22px; flex-shrink: 0; }
.alert-body { flex: 1; }
.alert-title { font-weight: 700; font-size: 14px; }
.alert-desc { font-size: 12px; color: #cbd5e1; margin-top: 3px; }
.alert-backtest { font-size: 11px; color: #94a3b8; margin-top: 6px; font-style: italic; }
.alert-high { background: rgba(239, 68, 68, 0.08); border-color: rgba(239, 68, 68, 0.3); }
.alert-high .alert-title { color: #ef4444; }
.alert-medium { background: rgba(251, 146, 60, 0.08); border-color: rgba(251, 146, 60, 0.3); }
.alert-medium .alert-title { color: #fb923c; }

/* ──────────────────────────────────────────────────────────
   Backtest table
   ────────────────────────────────────────────────────────── */
.bt-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.bt-table th, .bt-table td { padding: 8px 10px; text-align: left; border-bottom: 1px solid rgba(148, 163, 184, 0.08); }
.bt-table th { color: #64748b; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
.bt-table tr.current { background: rgba(34, 197, 94, 0.08); }
.bt-table td.num { text-align: right; font-variant-numeric: tabular-nums; }

/* ──────────────────────────────────────────────────────────
   Settings modal
   ────────────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7);
  z-index: 200; display: none; align-items: flex-end; justify-content: center;
  backdrop-filter: blur(8px);
}
.modal-overlay.show { display: flex; }
.modal {
  background: #0f172a; border-radius: 24px 24px 0 0;
  width: 100%; max-width: 480px; max-height: 80vh; overflow-y: auto;
  padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
  border: 1px solid rgba(148, 163, 184, 0.15); border-bottom: none;
}
.modal h2 { font-size: 18px; margin-bottom: 16px; }
.modal label { display: block; margin-bottom: 12px; font-size: 13px; color: #94a3b8; }
.modal label .lbl-text { display: block; margin-bottom: 4px; }
.modal input {
  width: 100%; padding: 10px 12px;
  background: rgba(30, 41, 59, 0.7);
  border: 1px solid rgba(148, 163, 184, 0.2);
  border-radius: 10px; color: #e2e8f0; font-size: 14px;
}
.modal-actions { display: flex; gap: 10px; margin-top: 16px; }
.modal-actions button {
  flex: 1; padding: 12px; border-radius: 10px; border: none;
  font-size: 14px; font-weight: 600; cursor: pointer;
}
.btn-primary { background: #2563eb; color: white; }
.btn-secondary { background: rgba(148, 163, 184, 0.15); color: #cbd5e1; }
.modal-help {
  font-size: 12px; color: #64748b; margin-top: 12px; padding: 10px;
  background: rgba(15, 23, 42, 0.5); border-radius: 10px;
  line-height: 1.5;
}

/* ──────────────────────────────────────────────────────────
   Loading
   ────────────────────────────────────────────────────────── */
.loading { text-align: center; padding: 60px 16px; color: #64748b; }
.spinner {
  width: 32px; height: 32px;
  border: 3px solid rgba(148, 163, 184, 0.15);
  border-top-color: #60a5fa; border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-msg {
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.3);
  padding: 14px; border-radius: 10px;
  color: #fca5a5; font-size: 13px;
  margin-bottom: 14px;
}
.section-title { font-size: 13px; font-weight: 700; color: #cbd5e1; margin: 18px 0 10px; }
.section-title:first-child { margin-top: 0; }

/* ──────────────────────────────────────────────────────────
   시장 사이클 그래픽 (옵션 A)
   ────────────────────────────────────────────────────────── */
.cycle-card { margin-bottom: 14px; }
.cycle-svg { width: 100%; height: auto; display: block; }
.cycle-node { transition: all 0.3s ease; }
.cycle-current-label {
  text-align: center; margin-top: 8px;
  font-size: 13px; font-weight: 600;
}
.cycle-next-hint {
  margin-top: 10px; padding: 8px 12px;
  background: rgba(15, 23, 42, 0.5);
  border-radius: 8px;
  font-size: 12px; color: #94a3b8;
  border: 1px solid rgba(148, 163, 184, 0.08);
}
.cycle-next-hint .next-arrow { color: #fb923c; font-weight: 600; }

/* ──────────────────────────────────────────────────────────
   신호 게이지 (옵션 B)
   ────────────────────────────────────────────────────────── */
.gauge-row { margin-bottom: 14px; }
.gauge-row:last-child { margin-bottom: 0; }
.gauge-header {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 6px;
}
.gauge-label { font-size: 13px; font-weight: 600; color: #cbd5e1; }
.gauge-value { font-size: 12px; color: #94a3b8; }
.gauge-track {
  position: relative; height: 12px;
  background: linear-gradient(90deg, 
    rgba(239, 68, 68, 0.25) 0%, 
    rgba(148, 163, 184, 0.15) 50%, 
    rgba(34, 197, 94, 0.25) 100%);
  border-radius: 6px;
  margin: 4px 0;
}
.gauge-center {
  position: absolute; left: 50%; top: -2px;
  width: 1px; height: 16px;
  background: rgba(148, 163, 184, 0.4);
}
.gauge-marker {
  position: absolute; top: 50%;
  width: 18px; height: 18px;
  border-radius: 50%;
  border: 2px solid #0f172a;
  transform: translate(-50%, -50%);
  transition: left 0.4s ease, background 0.4s ease;
  box-shadow: 0 0 8px currentColor;
}
.gauge-marker.pos-strong { background: #22c55e; color: rgba(34, 197, 94, 0.4); }
.gauge-marker.pos-mid { background: #84cc16; color: rgba(132, 204, 22, 0.4); }
.gauge-marker.pos-weak { background: #facc15; color: rgba(250, 204, 21, 0.4); }
.gauge-marker.neutral { background: #94a3b8; color: rgba(148, 163, 184, 0.4); }
.gauge-marker.neg-weak { background: #fb923c; color: rgba(251, 146, 60, 0.4); }
.gauge-marker.neg-mid { background: #f97316; color: rgba(249, 115, 22, 0.4); }
.gauge-marker.neg-strong { background: #ef4444; color: rgba(239, 68, 68, 0.4); }
.gauge-scale {
  display: flex; justify-content: space-between;
  font-size: 9px; color: #64748b;
  margin-top: 4px;
}
.gauge-summary {
  margin-top: 12px; padding: 10px 12px;
  background: rgba(15, 23, 42, 0.5);
  border-radius: 8px;
  font-size: 12px;
  border: 1px solid rgba(148, 163, 184, 0.08);
}
.gauge-summary-label { color: #64748b; font-size: 11px; }
.gauge-summary-text { color: #cbd5e1; margin-top: 4px; font-weight: 500; }

/* ──────────────────────────────────────────────────────────
   행동 권고 카드
   ────────────────────────────────────────────────────────── */
.action-card { margin-bottom: 14px; }
.action-row { display: flex; gap: 12px; align-items: flex-start; }
.action-icon-wrap {
  width: 44px; height: 44px; border-radius: 50%;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.action-icon-wrap.do-buy { background: rgba(34, 197, 94, 0.15); }
.action-icon-wrap.do-sell { background: rgba(239, 68, 68, 0.15); }
.action-icon-wrap.do-wait { background: rgba(251, 146, 60, 0.15); }
.action-icon-wrap.do-hold { background: rgba(148, 163, 184, 0.15); }
.action-body { flex: 1; }
.action-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.action-title.do-buy { color: #22c55e; }
.action-title.do-sell { color: #ef4444; }
.action-title.do-wait { color: #fb923c; }
.action-title.do-hold { color: #cbd5e1; }
.action-desc {
  font-size: 13px; color: #94a3b8;
  line-height: 1.5;
}
.action-confidence {
  margin-top: 12px; padding: 10px 12px;
  background: rgba(15, 23, 42, 0.5);
  border-radius: 8px;
  border: 1px solid rgba(148, 163, 184, 0.08);
}
.action-confidence-label {
  font-size: 11px; color: #64748b;
  text-transform: uppercase; letter-spacing: 0.4px;
  margin-bottom: 4px;
}
.action-confidence-bar {
  display: flex; align-items: center; gap: 8px;
}
.action-confidence-track {
  flex: 1; height: 6px;
  background: rgba(148, 163, 184, 0.1);
  border-radius: 3px; overflow: hidden;
}
.action-confidence-fill {
  height: 100%; border-radius: 3px;
  transition: width 0.4s ease;
}
.action-confidence-fill.high { background: #22c55e; }
.action-confidence-fill.medium { background: #facc15; }
.action-confidence-fill.low { background: #fb923c; }
.action-confidence-fill.very-low { background: #94a3b8; }
.action-confidence-label-text {
  font-size: 12px; font-weight: 600;
  min-width: 36px; text-align: right;
}
.action-backtest {
  font-size: 11px; color: #64748b;
  margin-top: 6px;
}

/* ──────────────────────────────────────────────────────────
   강력 신호 배너 (검증된 최강 신호만 강조)
   ────────────────────────────────────────────────────────── */
.strong-signal-banner {
  position: relative;
  border-radius: 14px;
  padding: 16px 18px;
  margin-bottom: 14px;
  border-width: 2px;
  border-style: solid;
  overflow: hidden;
}
.strong-signal-banner.buy {
  background: #04342C;
  border-color: #0F6E56;
}
.strong-signal-banner.sell {
  background: #501313;
  border-color: #A32D2D;
}
.strong-signal-banner.conflict {
  background: linear-gradient(135deg, #501313 0%, #4A1B0C 100%);
  border-color: #A32D2D;
}
.ssb-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
}
.ssb-pulse {
  width: 9px; height: 9px;
  border-radius: 50%;
  animation: ssb-pulse 1.8s ease-in-out infinite;
}
.strong-signal-banner.buy .ssb-pulse { background: #5DCAA5; box-shadow: 0 0 8px #5DCAA5; }
.strong-signal-banner.sell .ssb-pulse,
.strong-signal-banner.conflict .ssb-pulse { background: #F09595; box-shadow: 0 0 8px #F09595; }
@keyframes ssb-pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.45; transform: scale(0.85); }
}
.ssb-tag {
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.6px;
}
.strong-signal-banner.buy .ssb-tag { color: #9FE1CB; }
.strong-signal-banner.sell .ssb-tag,
.strong-signal-banner.conflict .ssb-tag { color: #F7C1C1; }
.ssb-title {
  font-size: 18px; font-weight: 600;
  margin-bottom: 6px;
}
.strong-signal-banner.buy .ssb-title { color: #E1F5EE; }
.strong-signal-banner.sell .ssb-title,
.strong-signal-banner.conflict .ssb-title { color: #FCEBEB; }
.ssb-desc {
  font-size: 13.5px;
  line-height: 1.55;
}
.strong-signal-banner.buy .ssb-desc { color: #9FE1CB; }

</style>
</head>
<body>

<!-- ────────────────────────────────────────────────────────── -->

<!-- Settings modal -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h2>⚙️ 설정</h2>
    <label>
      <span class="lbl-text">단기 저장소 사용자명</span>
      <input type="text" id="cfg-user" placeholder="mryang82">
    </label>
    <label>
      <span class="lbl-text">단기 저장소 이름</span>
      <input type="text" id="cfg-repo" placeholder="market-signal-monitor-short">
    </label>
    <label>
      <span class="lbl-text">브랜치</span>
      <input type="text" id="cfg-branch" placeholder="main">
    </label>
    <div class="modal-help">
      통합 PWA는 <b>data_unified.json</b>을 fetch합니다.<br>
      URL: https://raw.githubusercontent.com/[user]/[repo]/[branch]/data_unified.json
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeSettings()">취소</button>

<script>
// ──────────────────────────────────────────────────────────
// 설정
// ──────────────────────────────────────────────────────────
const DEFAULT_USER = "mryang82";
const DEFAULT_REPO = "market-signal-monitor-short";
const DEFAULT_BRANCH = "main";

function getConfig() {
  return {
    user: localStorage.getItem("v12_user") || DEFAULT_USER,
    repo: localStorage.getItem("v12_repo") || DEFAULT_REPO,
    branch: localStorage.getItem("v12_branch") || DEFAULT_BRANCH,
  };
}

function getDataUrl() {
  const c = getConfig();
  return `https://raw.githubusercontent.com/${c.user}/${c.repo}/${c.branch}/data_unified.json?t=${Date.now()}`;
}

// 상태
let appData = null;

// ──────────────────────────────────────────────────────────
// Tab 전환
// ──────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    const page = btn.dataset.page;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`page-${page}`).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
});

// ──────────────────────────────────────────────────────────
// 데이터 fetch
// ──────────────────────────────────────────────────────────
async function fetchData() {
  try {
    const r = await fetch(getDataUrl(), { cache: 'no-cache' });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    appData = await r.json();
    updateLastUpdate(true);
    render();
  } catch (err) {
    console.error(err);
    updateLastUpdate(false, err.message);
    renderError(err);
  }
}

function updateLastUpdate(success, errMsg) {
  const el = document.getElementById('last-update');
  if (success && appData) {
    const ts = appData.timestamp ? new Date(appData.timestamp) : null;
    if (ts) {
      const now = new Date();
      const diffMin = Math.floor((now - ts) / 60000);
      let timeStr;
      if (diffMin < 60) timeStr = `${diffMin}분 전`;
      else if (diffMin < 1440) timeStr = `${Math.floor(diffMin / 60)}시간 전`;
      else timeStr = `${Math.floor(diffMin / 1440)}일 전`;
      
      const cls = diffMin < 1440 ? 'fresh' : 'stale';
      el.className = `last-update ${cls}`;
      el.textContent = `마지막 업데이트: ${ts.toLocaleString('ko-KR', { 
        month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' 
      })} (${timeStr})`;
    }
  } else {
    el.className = 'last-update error';
    el.textContent = `❌ 데이터 로딩 실패${errMsg ? ': ' + errMsg : ''}`;
  }
}

function renderError(err) {
  const html = `<div class="error-msg">
    데이터를 불러올 수 없습니다.<br>
    ⚙️ 설정에서 저장소 정보를 확인하거나, 잠시 후 다시 시도하세요.<br>
    <br>오류: ${err.message}
  </div>`;
  ['main', 'long', 'short', 'context'].forEach(p => {
    document.getElementById(`${p}-content`).innerHTML = html;
  });
}

// ──────────────────────────────────────────────────────────
// 렌더링 — 메인 탭
// ──────────────────────────────────────────────────────────
function render() {
  if (!appData) return;
  renderMain();
  renderLong();
  renderShort();
  renderContext();
}

function renderMain() {
  const c = document.getElementById('main-content');
  const long = appData.long_term;
  const short = appData.short_term;
  const conflict = appData.conflict;
  
  // 종합 상태 결정 (가장 중요한 신호 우선)
  let primaryLevel = "NEUTRAL";
  let primaryLabel = "현 포지션 유지";
  let primarySub = "특별한 신호 없음";
  
  if (short?.level === "PANIC_BUY" || long?.level === "CRASH_BUY") {
    primaryLevel = short?.level === "PANIC_BUY" ? "PANIC_BUY" : "CRASH_BUY";
    primaryLabel = "극단 패닉 매수";
    primarySub = "역사적 진입 기회";
  } else if (short?.level === "SHIFT_DOWN") {
    primaryLevel = "SHIFT_DOWN";
    primaryLabel = "단기 매도 신호";
    primarySub = "3M-10% 적중률 43%";
  } else if (long?.level === "STRONG_BUY") {
    primaryLevel = "STRONG_BUY";
    primaryLabel = "장기 강력 매수";
    primarySub = "12M+15% 적중률 80%";
  } else if (short?.level === "SHIFT_UP") {
    primaryLevel = "SHIFT_UP";
    primaryLabel = "단기 매수 진입";
    primarySub = "3M+10% 적중률 49%";
  } else if (long?.level === "BUY" || short?.level === "CAUTION_UP") {
    primaryLevel = long?.level === "BUY" ? "BUY" : "CAUTION_UP";
    primaryLabel = "분할 매수 검토";
    primarySub = "추세 양호";
  } else if (short?.level === "CAUTION_DOWN") {
    primaryLevel = "CAUTION_DOWN";
    primaryLabel = "비중 조절 검토";
    primarySub = "3M-10% 적중률 32%";
  }
  
  const emoji = getEmoji(primaryLevel);
  
  // 강력 신호 배너 (검증된 최강 신호 - 상단 최우선 표시)
  let html = renderStrongSignalBanners(long?.level, short?.level, conflict);
  
  html += `
    <div class="status-big level-${primaryLevel}">
      <div class="status-emoji">${emoji}</div>
      <div class="status-level">${primaryLabel}</div>
      <div class="status-sub">${primarySub}</div>
    </div>
  `;
  
  // 충돌 배너 — 정직한 메시지 (Walk-Forward 검증 후)
  if (conflict) {
    // conflict_buy_sell (장기 매수 + 단기 매도)은 정직한 메시지로 오버라이드
    let cb_title = conflict.title;
    let cb_desc = conflict.desc || '';
    let cb_level = conflict.level;
    
    if (conflict.type === "conflict_buy_sell") {
      cb_title = "⚠️ 충돌: 장기 매수 + 단기 매도";
      cb_desc = "장기와 단기 신호 방향이 다름 — 진입 보류 권고. " +
                "<small style='color:#94a3b8;'>(과거 적중률은 시기 의존성 큼)</small>";
      cb_level = "warn";  // danger → warn으로 강등
    }
    
    const clsMap = { good: 'conflict-good', warn: 'conflict-warn', danger: 'conflict-danger', info: 'conflict-info' };
    const cls = clsMap[cb_level] || 'conflict-info';
    const icon = cb_level === 'good' ? '✓' : 
                 cb_level === 'danger' ? '⚠️' :
                 cb_level === 'warn' ? '⚠️' : 'ℹ️';
    html += `
      <div class="conflict-banner ${cls}">
        <div class="cb-icon">${icon}</div>
        <div class="cb-body">
          <div class="cb-title">${cb_title}</div>
          <div class="cb-desc">${cb_desc}</div>
        </div>
      </div>
    `;
  }
  
  // 장기/단기 요약
  html += `
    <div class="summary-row">
      <div class="summary-cell" onclick="goToTab('long')">
        <div class="sc-label">📊 장기 (12M)</div>
        <div class="sc-level level-${long?.level || 'NEUTRAL'}" style="background:none; padding:0;">
          ${long?.level || '?'}
        </div>
        <div class="sc-meta">${long?.score !== undefined ? '점수 ' + (long.score >= 0 ? '+' : '') + long.score.toFixed(1) : ''}</div>
      </div>
      <div class="summary-cell" onclick="goToTab('short')">
        <div class="sc-label">⚡ 단기 (3M)</div>
        <div class="sc-level level-${short?.level || 'NEUTRAL'}" style="background:none; padding:0;">
          ${short?.level || '?'}
        </div>
        <div class="sc-meta">${short?.score !== undefined ? '점수 ' + (short.score >= 0 ? '+' : '') + short.score : ''}</div>
      </div>
    </div>
  `;
  
  // 시장 사이클 (옵션 A)
  html += renderMarketCycle(long?.level, short?.level);
  
  // 신호 게이지 (옵션 B)
  html += renderSignalGauges(long, short);
  
  // 행동 권고 카드
  html += renderActionCard(long?.level, short?.level, conflict);
  
  // F&G 게이지 (참고용)
  html += renderFGGauge(long);
  
  // 현금 비중 카드 (검증된 신호 기반)
  html += renderCashAllocation(long?.level, short?.level, conflict, short?.context_alerts || []);
  
  // 활성 컨텍스트 알람 요약
  const alerts = short?.context_alerts || [];
  if (alerts.length > 0) {
    html += `
      <div class="card">
        <div class="card-title">⚠️ 활성 위험 알람 <span class="card-hint">${alerts.length}개</span></div>
        ${alerts.map(a => `
          <div class="alert-item alert-${a.level}" style="margin-bottom:8px;">
            <div class="alert-icon">⚠️</div>
            <div class="alert-body">
              <div class="alert-title">${a.title}</div>
              <div class="alert-desc">${a.desc}</div>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }
  
  // 핵심 지표 요약
  const ind = short?.indicators || {};
  html += `
    <div class="card">
      <div class="card-title">📊 시장 스냅샷</div>
      <div class="indicator-grid">
        ${renderIndicator('SPX', ind.SPX, '', 0)}
        ${renderIndicator('VIX', ind.VIX, '', 1)}
        ${renderIndicator('SPX 20d', ind.SPX_20d_chg, '%', 2, true)}

  `;
  
  // 데이터 헬스 체크 (footer)
  html += renderHealthCheck();
  
  c.innerHTML = html;
}

// ──────────────────────────────────────────────────────────
// 시장 사이클 (옵션 A)
// ──────────────────────────────────────────────────────────
function getCyclePosition(longLevel, shortLevel) {
  // 8단계 사이클 위치 결정
  // 0: 패닉바닥, 1: 회복, 2: 강세확장, 3: 안주, 
  // 4: 정점영역, 5: 초기하락, 6: 하락가속, 7: 베어바닥
  
  const longBuyStrong = longLevel === "CRASH_BUY" || longLevel === "STRONG_BUY";
  const longBuyWeak = longLevel === "BUY" || longLevel === "WATCH";
  const longSell = longLevel === "CAUTION" || longLevel === "WARNING" || longLevel === "STRONG_SELL";
  const shortBuyStrong = shortLevel === "PANIC_BUY";
  const shortBuyMid = shortLevel === "SHIFT_UP";
  const shortBuyWeak = shortLevel === "CAUTION_UP";
  const shortSellStrong = shortLevel === "SHIFT_DOWN";
  const shortSellWeak = shortLevel === "CAUTION_DOWN";
  
  if (longBuyStrong && shortBuyStrong) return { pos: 0, name: "패닉 바닥", desc: "역사적 진입 기회" };
  if (longBuyStrong && (shortBuyMid || shortBuyWeak)) return { pos: 1, name: "회복", desc: "장기 강세 시작" };
  if (longBuyWeak && (shortBuyMid || shortBuyWeak)) return { pos: 2, name: "강세 확장", desc: "추세 양호" };
  if (longBuyWeak && shortLevel === "NEUTRAL") return { pos: 3, name: "안주", desc: "변동성 낮음" };
  if (longSell && shortLevel === "NEUTRAL") return { pos: 4, name: "정점 영역", desc: "추세 약화 신호" };
  if (longSell && shortSellWeak) return { pos: 5, name: "초기 하락", desc: "비중 조절 검토" };
  if (longSell && shortSellStrong) return { pos: 6, name: "하락 가속", desc: "방어 자세" };
  if (longBuyStrong && shortSellStrong) return { pos: 5, name: "초기 하락", desc: "장단기 충돌" };
  if (longSell && shortBuyStrong) return { pos: 7, name: "베어 바닥", desc: "반등 시도" };
  
  // 기본값 (NEUTRAL/NEUTRAL 등)
  if (shortSellStrong) return { pos: 6, name: "하락 가속", desc: "단기 매도 신호" };
  if (shortSellWeak) return { pos: 5, name: "초기 하락", desc: "주의 단계" };
  if (shortBuyStrong) return { pos: 0, name: "패닉 바닥", desc: "단기 패닉 매수" };
  if (shortBuyMid) return { pos: 2, name: "강세 확장", desc: "단기 매수 진입" };
  if (longBuyWeak) return { pos: 2, name: "강세 확장", desc: "장기 양호" };
  if (longSell) return { pos: 4, name: "정점 영역", desc: "장기 약한 매도" };
  return { pos: 3, name: "안주", desc: "특별 신호 없음" };
}

function renderMarketCycle(longLevel, shortLevel) {
  const cycle = getCyclePosition(longLevel, shortLevel);
  
  // 8개 노드의 좌표 (타원 위)
  const nodes = [
    { x: 35, y: 130, name: "패닉바닥", color: "#A32D2D" },      // 0
    { x: 80, y: 60, name: "회복", color: "#3B6D11" },           // 1
    { x: 175, y: 38, name: "강세확장", color: "#639922" },      // 2
    { x: 270, y: 60, name: "안주", color: "#BA7517" },          // 3
    { x: 315, y: 130, name: "정점", color: "#993556" },         // 4
    { x: 270, y: 200, name: "초기하락", color: "#993C1D" },     // 5
    { x: 175, y: 222, name: "하락가속", color: "#A32D2D" },     // 6
    { x: 80, y: 200, name: "베어바닥", color: "#791F1F" },      // 7
  ];
  
  const cur = nodes[cycle.pos];
  
  // 다음 단계 힌트
  const nextHints = [
    "→ 회복 (단기 매수 강화 시)",
    "→ 강세 확장 (장기 BUY 진입 시)",
    "→ 안주 / 정점 (모멘텀 약화 시)",
    "→ 정점 영역 (장기 약화 시)",
    "→ 초기 하락 (단기 매도 발효 시)",
    "→ 하락 가속 (SHIFT_DOWN 발효 시)",
    "→ 베어 바닥 (단기 패닉 도달 시)",
    "→ 회복 (장기 매수 신호 시)",
  ];
  
  let svgNodes = '';
  nodes.forEach((n, i) => {
    const isCur = i === cycle.pos;
    const r = isCur ? 9 : 5;
    const opacity = isCur ? 1 : 0.5;
    svgNodes += `
      <g class="cycle-node">
        <circle cx="${n.x}" cy="${n.y}" r="${r}" fill="${n.color}" opacity="${opacity}"
          ${isCur ? 'stroke="#0f172a" stroke-width="2"' : ''}/>
        <text x="${n.x}" y="${n.y > 130 ? n.y + 18 : n.y - 12}" 
          font-size="${isCur ? 10 : 9}" font-weight="${isCur ? 700 : 400}"
          fill="${isCur ? '#e2e8f0' : '#64748b'}" text-anchor="middle">${n.name}</text>
      </g>
    `;
  });
  
  return `
    <div class="card cycle-card">
      <div class="card-title">📍 시장 사이클 위치</div>
      <svg class="cycle-svg" viewBox="0 0 350 250" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="175" cy="130" rx="140" ry="92" fill="none" 
          stroke="rgba(148,163,184,0.15)" stroke-width="1" stroke-dasharray="3 4"/>
        ${svgNodes}
      </svg>
      <div class="cycle-current-label" style="color: ${cur.color};">
        현재: ${cycle.name} — ${cycle.desc}
      </div>
      <div class="cycle-next-hint">
        다음 가능 단계 <span class="next-arrow">${nextHints[cycle.pos]}</span>
      </div>
    </div>
  `;
}

// ──────────────────────────────────────────────────────────
// 신호 게이지 (옵션 B)
// ──────────────────────────────────────────────────────────
function levelToGaugeScore(level) {
  // -100 ~ +100 매핑
  const map = {
    CRASH_BUY: 100, STRONG_BUY: 85, BUY: 50, WATCH: 25,
    PANIC_BUY: 100, SHIFT_UP: 65, CAUTION_UP: 30,
    NEUTRAL: 0,
    CAUTION_DOWN: -35, CAUTION: -40,
    SHIFT_DOWN: -75, WARNING: -65, STRONG_SELL: -90,
  };
  return map[level] !== undefined ? map[level] : 0;
}

function gaugeMarkerClass(score) {
  if (score >= 70) return "pos-strong";
  if (score >= 30) return "pos-mid";
  if (score >= 10) return "pos-weak";
  if (score <= -70) return "neg-strong";
  if (score <= -30) return "neg-mid";
  if (score <= -10) return "neg-weak";
  return "neutral";
}

function renderSignalGauges(long, short) {
  const longScore = levelToGaugeScore(long?.level);
  const shortScore = levelToGaugeScore(short?.level);
  
  // -100~+100 → 0~100% 위치
  const longPct = ((longScore + 100) / 200) * 100;
  const shortPct = ((shortScore + 100) / 200) * 100;
  
  // 결합 요약
  let summary;
  if (longScore >= 50 && shortScore >= 30) {
    summary = "✅ 매수 합의 — 강한 진입 신호";
  } else if (longScore <= -30 && shortScore <= -30) {
    summary = "📉 매도 합의 — 단기 매도 신뢰";
  } else if (longScore >= 30 && shortScore <= -30) {
    summary = "⚠️ 충돌 — 진입 보류 권고";
  } else if (longScore <= -30 && shortScore >= 30) {
    summary = "⚠️ 충돌 — 단기 반등, 장기 위험";
  } else if (Math.abs(longScore) < 20 && Math.abs(shortScore) < 20) {
    summary = "⚪ 중립 — 현 포지션 유지";
  } else if (longScore >= 30) {
    summary = "장기 매수 신호 (단기 중립)";
  } else if (shortScore >= 30) {
    summary = "단기 매수 시도 (장기 대기)";
  } else if (shortScore <= -30) {
    summary = "단기 매도 — 비중 조절";
  } else if (longScore <= -30) {
    summary = "장기 약한 매도 — 관망";
  } else {
    summary = "혼합 신호 — 모니터링";
  }
  
  return `
    <div class="card">
      <div class="card-title">📈 신호 강도 게이지</div>
      
      <div class="gauge-row">
        <div class="gauge-header">
          <span class="gauge-label">📊 장기 (12M)</span>
          <span class="gauge-value">${long?.level || 'N/A'} · ${longScore >= 0 ? '+' : ''}${longScore}</span>
        </div>
        <div class="gauge-track">
          <div class="gauge-center"></div>
          <div class="gauge-marker ${gaugeMarkerClass(longScore)}" style="left: ${longPct}%;"></div>
        </div>
        <div class="gauge-scale">
          <span>매도 강함</span>
          <span>중립</span>
          <span>매수 강함</span>
        </div>
      </div>
      
      <div class="gauge-row">
        <div class="gauge-header">
          <span class="gauge-label">⚡ 단기 (3M)</span>
          <span class="gauge-value">${short?.level || 'N/A'} · ${shortScore >= 0 ? '+' : ''}${shortScore}</span>
        </div>
        <div class="gauge-track">
          <div class="gauge-center"></div>
          <div class="gauge-marker ${gaugeMarkerClass(shortScore)}" style="left: ${shortPct}%;"></div>
        </div>
        <div class="gauge-scale">
          <span>매도 강함</span>
          <span>중립</span>
          <span>매수 강함</span>
        </div>
      </div>
      
      <div class="gauge-summary">
        <div class="gauge-summary-label">결합 상태</div>
        <div class="gauge-summary-text">${summary}</div>
      </div>
    </div>
  `;
}

// ──────────────────────────────────────────────────────────
// 행동 권고 카드
// ──────────────────────────────────────────────────────────
function getActionRecommendation(longLevel, shortLevel, conflict) {
  // 우선순위에 따라 행동 결정
  const longBuyStrong = longLevel === "CRASH_BUY" || longLevel === "STRONG_BUY";
  const shortBuyStrong = shortLevel === "PANIC_BUY";
  const shortBuyMid = shortLevel === "SHIFT_UP";
  const shortSellStrong = shortLevel === "SHIFT_DOWN";
  
  // 최우선: 패닉 매수 신호
  if (shortBuyStrong || longLevel === "CRASH_BUY") {
    return {
      type: "do-buy",
      icon: "🚀",
      title: "극단 패닉 매수",
      desc: "역사적 진입 기회. 분할 매수 권장 (3~4회 분할).",
      confidence: { level: "high", value: 56, label: "높음" },
      backtest: "단독 PANIC_BUY 3M+10% 적중률 56% · n=293",
    };
  }
  
  // 매수 합의
  if (longBuyStrong && (shortBuyMid || shortLevel === "CAUTION_UP")) {
    return {
      type: "do-buy",
      icon: "📈",
      title: "매수 합의 — 진입",
      desc: "장기 강세 + 단기 모멘텀 양호. 분할 매수 시작.",
      confidence: { level: "high", value: 55, label: "높음" },
      backtest: "장단기 매수 합의 12M+15% 적중률 55% · n=944",
    };
  }
  
  // 충돌 (장기 매수 + 단기 매도)
  if (conflict?.type === "conflict_buy_sell") {
    return {
      type: "do-wait",
      icon: "⚠️",
      title: "진입 보류 검토",
      desc: "장기/단기 신호 방향 다름. 단기 정리 후 진입 검토.",
      confidence: { level: "low", value: 30, label: "낮음" },
      backtest: "시기 의존성 큼 — 2008 이전엔 작동, 2011 이후 16년간 약함",
    };
  }
  
  // 단기 매도
  if (shortSellStrong) {
    return {
      type: "do-sell",
      icon: "📉",
      title: "단기 비중 축소",
      desc: "단기 모멘텀 매도. 20~30% 비중 축소 검토.",
      confidence: { level: "medium", value: 43, label: "중간" },
      backtest: "SHIFT_DOWN 3M-10% 적중률 43% · n=334",
    };
  }
  
  if (shortLevel === "CAUTION_DOWN") {
    return {
      type: "do-wait",
      icon: "🟡",
      title: "비중 조절 검토",
      desc: "단기 약세 신호. 신규 매수 자제, 기존 포지션 점검.",
      confidence: { level: "medium", value: 32, label: "중간" },
      backtest: "CAUTION_DOWN 3M-10% 적중률 32% · n=877",
    };
  }
  
  // 장기 강력 매수만 (단기 중립)
  if (longBuyStrong) {
    return {
      type: "do-buy",
      icon: "💚",
      title: "장기 분할 매수",
      desc: "장기 매수 신호 강함. 단기 신호 무관 분할 매수 가능.",
      confidence: { level: "high", value: 80, label: "매우 높음" },
      backtest: "STRONG_BUY 12M+15% 적중률 80% · n=222",
    };
  }
  
  // 단기 매수 (장기 중립)
  if (shortBuyMid) {
    return {
      type: "do-buy",
      icon: "🟢",
      title: "단기 매수 진입",
      desc: "단기 추세 전환. 짧은 진입 시도 (~3개월).",
      confidence: { level: "medium", value: 49, label: "중간" },
      backtest: "SHIFT_UP 3M+10% 적중률 49% · n=689",
    };
  }
  
  if (shortLevel === "CAUTION_UP") {
    return {
      type: "do-buy",
      icon: "🟢",
      title: "분할 매수 검토",
      desc: "단기 회복 시도. 소량 매수 또는 관찰.",
      confidence: { level: "low", value: 31, label: "낮음" },
      backtest: "CAUTION_UP 3M+10% 적중률 31% · n=753",
    };
  }
  
  // 장기 약한 매도
  if (longLevel === "CAUTION" || longLevel === "WARNING") {
    return {
      type: "do-wait",
      icon: "⚪",
      title: "관망",
      desc: "장기 약한 매도 신호 (낮은 신뢰). 단기 신호 대기.",
      confidence: { level: "very-low", value: 16, label: "낮음" },
      backtest: "v9 매도 적중률 16% — 운영 제외 신호, 참고용",
    };
  }
  
  // 기본: 중립
  return {
    type: "do-hold",
    icon: "⚪",
    title: "현 포지션 유지",
    desc: "특별한 행동 신호 없음. 정기 모니터링.",
    confidence: { level: "very-low", value: 0, label: "신호없음" },
    backtest: "중립 — 변화 시 자동 알림",
  };
}

  const action = getActionRecommendation(longLevel, shortLevel, conflict);

function renderFGGauge(long) {
  if (!long || long.fg === undefined || long.fg === null) {
    return ''; // 데이터 없으면 표시 안 함
  }
  
  const fg = long.fg;
  const fg1m = long.fg_1m_ago !== undefined ? long.fg_1m_ago : null;
  const change = fg1m !== null ? fg - fg1m : null;
  
  // 0~100 → -90도~90도 회전 (-90도=극공포, 0도=중립, 90도=극탐욕)
  // 반월에서 left(0%) → bottom(50%) → right(100%) 이므로
  // 각도 = -90 + (fg/100)*180
  const angle = -90 + (fg / 100) * 180;
  
  // 영역 결정
  let label, color;
  if (fg < 25) { label = "극공포"; color = "#A32D2D"; }
  else if (fg < 45) { label = "공포"; color = "#BA7517"; }
  else if (fg < 55) { label = "중립"; color = "#888780"; }
  else if (fg < 75) { label = "탐욕"; color = "#639922"; }
  else { label = "극탐욕"; color = "#3B6D11"; }
  
  // 변화 표시
  let changeStr = "";
  if (change !== null) {
    const sign = change > 0 ? "+" : "";
    const arrow = change > 5 ? "↗" : change < -5 ? "↘" : "→";
    changeStr = `${arrow} ${sign}${Math.round(change)}`;
  }
  
  return `
    <div class="card fg-card">
      <div class="fg-header">
        <span class="fg-title">📊 Fear & Greed Index</span>
        <span class="fg-source">CNN · 주식 sentiment</span>
      </div>
      <div class="fg-svg-wrap">
        <svg class="fg-svg" viewBox="0 0 340 150" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="fggrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#A32D2D"/>
              <stop offset="25%" stop-color="#BA7517"/>
              <stop offset="50%" stop-color="#888780"/>
              <stop offset="75%" stop-color="#639922"/>
              <stop offset="100%" stop-color="#3B6D11"/>
            </linearGradient>
          </defs>
          <!-- 반월 아크 -->
          <path d="M 30 130 A 140 140 0 0 1 310 130" 
            fill="none" stroke="url(#fggrad)" 
            stroke-width="20" stroke-linecap="round" opacity="0.5"/>
          
          <!-- 바늘 -->
          <g transform="rotate(${angle} 170 130)">
            <line x1="170" y1="130" x2="170" y2="32" 
              stroke="#e2e8f0" stroke-width="2.5"/>
            <circle cx="170" cy="130" r="7" fill="#e2e8f0"/>
          </g>
          
          <!-- 중앙 숫자 -->
          <text x="170" y="100" font-size="42" font-weight="500" 
            fill="#e2e8f0" text-anchor="middle">${Math.round(fg)}</text>
          <text x="170" y="120" font-size="13" 
            fill="${color}" text-anchor="middle" font-weight="600">${label}</text>
          
          <!-- 양 끝 레이블 -->
          <text x="22" y="145" font-size="10" 
            fill="#A32D2D" text-anchor="middle">극공포</text>
          <text x="318" y="145" font-size="10" 
            fill="#3B6D11" text-anchor="middle">극탐욕</text>
        </svg>
      </div>
      <div class="fg-footer">
        <span>1개월 전 ${fg1m !== null ? Math.round(fg1m) : '?'}</span>
        <span>${changeStr ? `<span class="fg-footer-value">${changeStr}</span>` : ''}</span>
      </div>
    </div>
  `;
}

// ──────────────────────────────────────────────────────────
// 현금 비중 (공격적 + 큰 변동 대응)
// ──────────────────────────────────────────────────────────
function computeCashAllocation(longLevel, shortLevel, conflict, contextAlerts) {
  const reasons = [];
  let cash = 10; // 기준선
  
  // 1) 패닉 매수 (최우선) — 풀투자
  if (longLevel === "CRASH_BUY") {
    return {
      cash: 0,
      reasons: [{text: "v8 CRASH_BUY (100% 적중)", value: "풀투자"}]
    };
  }
  
  if (shortLevel === "PANIC_BUY") {
    if (longLevel === "STRONG_BUY") {
      return {
        cash: 0,
        reasons: [{text: "★★★★ STRONG_BUY + PANIC_BUY (74% 적중, n=227)", value: "풀투자"}]
      };
    }
    return {
      cash: 3,
      reasons: [{text: "v2 PANIC_BUY (56% 적중)", value: "-7%p"}]
    };
  }
  
  // 2) 매수 합의
  if (longLevel === "STRONG_BUY" && (shortLevel === "SHIFT_UP" || shortLevel === "CAUTION_UP")) {
    return {
      cash: 0,
      reasons: [{text: `v8 STRONG_BUY + v2 ${shortLevel} 합의`, value: "풀투자"}]
    };
  }
  
  // 3) v8 STRONG_BUY 단독
  if (longLevel === "STRONG_BUY") {
    return {
      cash: 3,
      reasons: [{text: "v8 STRONG_BUY (72% 적중)", value: "-7%p"}]
    };
  }
  
  // 4) v2 SHIFT_UP
  if (shortLevel === "SHIFT_UP") {
    if (longLevel === "BUY" || longLevel === "WATCH") {
      return {
        cash: 5,
        reasons: [{text: `v8 ${longLevel} + v2 SHIFT_UP (매수 합의)`, value: "-5%p"}]
      };
    }
    return {
      cash: 7,
      reasons: [{text: "v2 SHIFT_UP (49% 적중)", value: "-3%p"}]
    };
  }
  
  // 5) 매도 신호 (점수 누적)
  cash = 10;
  reasons.push({text: "기준선 (공격적 성향)", value: "10%"});
  
  // 단기 매도
  if (shortLevel === "SHIFT_DOWN") {
    cash = 30;
    reasons.push({text: "v2 SHIFT_DOWN (42% 적중)", value: "+20%p", positive: true});
  } else if (shortLevel === "CAUTION_DOWN") {
    cash = 20;
    reasons.push({text: "v2 CAUTION_DOWN (38% 적중)", value: "+10%p", positive: true});
  }
  
  // 충돌 (장기 매수 + 단기 매도) — 시기 의존성 큼, 가중치 축소
  const isConflict = conflict && conflict.type === "conflict_buy_sell";
  if (isConflict) {
    // 기존 +15%p에서 축소: 단기 매도 신호가 이미 있으면 그대로, 없으면 약간 가산
    if (cash < 20) {
      const diff = 20 - cash;
      cash = 20;
      reasons.push({text: "충돌: 장기 매수 + 단기 매도 (시기 의존성 큼)", value: `+${diff}%p`, positive: true});
    }
  }
  
  // 컨텍스트 알람 (5%p씩 누적, 최대 15)
  const nAlerts = (contextAlerts || []).length;
  if (nAlerts > 0) {
    const added = Math.min(nAlerts * 5, 15);
    cash += added;
    const titles = contextAlerts.slice(0, 2).map(a => a.title).join(", ");
    reasons.push({text: `위험 알람 ${nAlerts}개: ${titles}`, value: `+${added}%p`, positive: true});
  }
  
  // 약한 매수 신호 (현금 약간 낮춤)
  if (cash === 10) {
    if (shortLevel === "CAUTION_UP") {
      cash = 8;
      reasons[reasons.length - 1] = {text: "v2 CAUTION_UP (32% 적중)", value: "-2%p"};
    } else if (longLevel === "BUY") {
      cash = 7;
      reasons[reasons.length - 1] = {text: "v8 BUY (47% 적중)", value: "-3%p"};
    } else if (longLevel === "WATCH") {
      cash = 8;
      reasons[reasons.length - 1] = {text: "v8 WATCH (36% 적중)", value: "-2%p"};
    }
  }
  
  // 상한 / 하한
  cash = Math.max(0, Math.min(40, cash));
  
  return {cash, reasons};
}

function renderCashAllocation(longLevel, shortLevel, conflict, contextAlerts) {
  const result = computeCashAllocation(longLevel, shortLevel, conflict, contextAlerts);
  const {cash, reasons} = result;
  
  // 색상 결정
  let colorClass, barColor;
  if (cash <= 5) { colorClass = "cash-color-full-invest"; barColor = "#22c55e"; }
  else if (cash <= 12) { colorClass = "cash-color-baseline"; barColor = "#94a3b8"; }
  else if (cash <= 25) { colorClass = "cash-color-warning"; barColor = "#fb923c"; }
  else { colorClass = "cash-color-danger"; barColor = "#ef4444"; }
  
  // 바 너비 (0~40% → 0~100% 너비)
  const barWidth = (cash / 40) * 100;
  
  // 상태 라벨
  let stateLabel;
  if (cash === 0) stateLabel = "풀투자";
  else if (cash <= 5) stateLabel = "적극 매수";
  else if (cash <= 12) stateLabel = "기준선";
  else if (cash <= 25) stateLabel = "조심";
  else stateLabel = "대피";
  
  return `
    <div class="card cash-card">
      <div class="cash-header">
        <span class="fg-title">💼 권고 현금 비중</span>
        <span class="cash-profile">공격적 · ${stateLabel}</span>
      </div>
      <div class="cash-big">
        <span class="cash-number ${colorClass}">${cash}</span>
        <span class="cash-percent">%</span>
        <span class="cash-baseline">기준선 10%</span>
      </div>
      <div class="cash-bar-wrap">
        <div class="cash-bar-track">
          <div class="cash-bar-baseline-label">10</div>
          <div class="cash-bar-baseline-marker"></div>
          <div class="cash-bar-fill" style="width: ${barWidth}%; background: ${barColor};"></div>
        </div>
        <div class="cash-scale">
          <span>0% (풀투자)</span>
          <span>20%</span>
          <span>40% (대피)</span>
        </div>
      </div>
      <div class="cash-reasons">
        <div class="cash-reasons-label">조정 내역</div>
        ${reasons.map(r => `
          <div class="cash-reason-row">
            <span class="cash-reason-text">${r.text}</span>
            <span class="cash-reason-value ${r.positive ? 'positive' : (r.value.startsWith('-') ? 'negative' : '')}">${r.value}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function renderHealthCheck() {
  const short = appData.short_term;
  const long = appData.long_term;
  const ind = short?.indicators || {};
  
  // 각 체크 항목
  const checks = [];
  
  // yfinance 데이터 (지표 개수로 추정)
  const indCount = Object.keys(ind).filter(k => ind[k] !== null && ind[k] !== undefined).length;
  if (indCount >= 15) {
    checks.push({ icon: "✓", text: `yfinance ${indCount}/17`, color: "#22c55e" });
  } else if (indCount >= 10) {
    checks.push({ icon: "⚠", text: `yfinance ${indCount}/17`, color: "#fb923c" });
  } else {
    checks.push({ icon: "✗", text: `yfinance ${indCount}/17`, color: "#ef4444" });
  }
  
  // 장기 데이터
  if (long && long.level) {
    checks.push({ icon: "✓", text: "장기 신호 ✓", color: "#22c55e" });
  } else {
    checks.push({ icon: "✗", text: "장기 신호 없음", color: "#ef4444" });
  }
  
  // F&G (long에 있어야 함)
  if (long && long.fg !== undefined && long.fg !== null) {
    checks.push({ icon: "✓", text: `F&G ${long.fg}`, color: "#22c55e" });
  } else {
    checks.push({ icon: "?", text: "F&G 없음", color: "#94a3b8" });
  }
  
  // 다음 실행 시각
  const now = new Date();
  const kstNow = new Date(now.getTime() + (9 * 60 - now.getTimezoneOffset()) * 60000);
  const hour = kstNow.getUTCHours();
  const minute = kstNow.getUTCMinutes();
  
  let nextTime;
  if (hour < 7 || (hour === 7 && minute < 30)) {
    nextTime = "오늘 07:30";
  } else if (hour < 22 || (hour === 22 && minute < 30)) {
    nextTime = "오늘 22:30";
  } else {
    nextTime = "내일 07:30";
  }
  checks.push({ icon: "⏰", text: `다음 ${nextTime}`, color: "#94a3b8" });
  
  // 종합 상태
  const failures = checks.filter(c => c.color === "#ef4444").length;
  const warnings = checks.filter(c => c.color === "#fb923c").length;
  let statusClass = "ok", statusText = "정상";
  if (failures > 0) { statusClass = "error"; statusText = "이상"; }
  else if (warnings > 0) { statusClass = "warn"; statusText = "경고"; }
  
  return `
    <div class="health-card">
      <div class="health-header">
        <div class="health-title">데이터 상태</div>
        <div class="health-status ${statusClass}">
          <span class="health-dot"></span>
          <span>${statusText}</span>
        </div>
      </div>
      <div class="health-grid">
        ${checks.map(c => `
          <div class="health-item">
            <span class="health-item-icon" style="color: ${c.color};">${c.icon}</span>
            <span class="health-item-text">${c.text}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function renderContext() {
  const c = document.getElementById('context-content');
  const short = appData.short_term;
  const ind = short?.indicators || {};
  const alerts = short?.context_alerts || [];
  
  let html = '';
  
  // 활성 알람
  html += `
    <div class="card">
      <div class="card-title">⚠️ 활성 알람 <span class="card-hint">${alerts.length}개</span></div>
      ${alerts.length > 0 ? alerts.map(a => `
        <div class="alert-item alert-${a.level}">
          <div class="alert-icon">⚠️</div>
          <div class="alert-body">
            <div class="alert-title">${a.title}</div>
            <div class="alert-desc">${a.desc}</div>
            <div class="alert-backtest">📊 ${a.backtest}</div>
          </div>
        </div>
      `).join('') : '<div class="empty-state">활성 알람 없음</div>'}
    </div>
  `;
  
  // 컨텍스트 지표 상세
  html += `
    <div class="card">
      <div class="card-title">🏦 은행 (KRE)</div>
      <div class="indicator-grid">
        ${renderIndicator('KRE 5d', ind.KRE_5d_chg, '%', 2, true)}
        ${renderIndicator('KRE 20d', ind.KRE_20d_chg, '%', 2, true)}
      </div>
      <div style="font-size:11px; color:#64748b; margin-top:10px;">
        20d &lt; -10% 단독 -15% 적중 28%, 5d &lt; -5% 단독 25%
      </div>
    </div>
  `;
  
  html += `
    <div class="card">
      <div class="card-title">🔌 반도체 (SOXX)</div>
      <div class="indicator-grid">
        ${renderIndicator('SOXX 20d', ind.SOXX_20d_chg, '%', 2, true)}
      </div>
      <div style="font-size:11px; color:#64748b; margin-top:10px;">
        20d &lt; -10% 단독 -15% 적중 28% (위험자산 선행)
      </div>
    </div>
  `;
  
  html += `
    <div class="card">
      <div class="card-title">📉 시장 폭 (IWM vs SPX)</div>
      <div class="indicator-grid">
        ${renderIndicator('IWM/SPX 20d', ind.IWM_SPX_20d_chg, '%', 2, true)}
      </div>
      <div style="font-size:11px; color:#64748b; margin-top:10px;">
        20d &lt; -5% 단독 -15% 적중 26% (소형주 약세 = 강세장 끝물)
      </div>
    </div>
  `;
  
  html += `
    <div class="card">
      <div class="card-title">📊 변동성 구조 (VIX)</div>
      <div class="indicator-grid">
        ${renderIndicator('VIX', ind.VIX, '', 1)}
        ${renderIndicator('VIX 5d', ind.VIX_5d_chg, '%', 1, true)}
        ${renderIndicator('VIX/VIX3M', ind.VIX_VIX3M_ratio, '', 2)}
        ${renderIndicator('VIX9D/VIX', ind.VIX9D_VIX_ratio, '', 2)}
        ${renderIndicator('VVIX', ind.VVIX, '', 1)}
        ${renderIndicator('SKEW', ind.SKEW, '', 1)}
      </div>
    </div>
  `;
  
  // 추가 매크로 지표
  html += `
    <div class="card">
      <div class="card-title">🌍 거시 지표</div>
      <div class="indicator-grid">
        ${renderIndicator('DXY', ind.DXY, '', 2)}
        ${renderIndicator('DXY 20d', ind.DXY_20d_chg, '%', 2, true)}
        ${renderIndicator('TNX', ind.TNX, '%', 2)}
        ${renderIndicator('TNX 5d', ind.TNX_5d_chg_bp, 'bp', 1, true)}
        ${renderIndicator('HYG 5d', ind.HYG_5d_chg, '%', 2, true)}
        ${renderIndicator('XLP/XLY 20d', ind.XLP_XLY_20d_chg, '%', 2, false)}
      </div>
    </div>
  `;
  
  c.innerHTML = html;
}

// ──────────────────────────────────────────────────────────
// 헬퍼
// ──────────────────────────────────────────────────────────
function getEmoji(level) {
  const map = {
    CRASH_BUY: "🚀", STRONG_BUY: "📈", BUY: "💚", WATCH: "👀",
    PANIC_BUY: "🚀", SHIFT_UP: "📈", CAUTION_UP: "🟢",
    NEUTRAL: "⚪",
    CAUTION_DOWN: "🟡", SHIFT_DOWN: "🔴",
    CAUTION: "🟡", WARNING: "🔴", STRONG_SELL: "⚠️",
  };
  return map[level] || "⚪";
}

function renderIndicator(label, value, unit, precision, signed) {
  if (value === null || value === undefined || isNaN(value)) {
    return `<div class="indicator-item">
      <div class="indicator-label">${label}</div>
      <div class="indicator-value" style="color:#64748b;">-</div>
    </div>`;
  }
  const num = parseFloat(value);
  let cls = '';
  if (signed) {
    cls = num > 0 ? 'pos' : (num < 0 ? 'neg' : '');
  }
  let display = num.toFixed(precision);
  if (signed && num > 0) display = '+' + display;
  if (unit) display += unit;
  return `<div class="indicator-item">
    <div class="indicator-label">${label}</div>
    <div class="indicator-value ${cls}">${display}</div>
  </div>`;
}

function renderPillar(letter, score, label) {
  const s = score || 0;
  const cls = s >= 3 ? 's3' : s >= 2 ? 's2' : s >= 1 ? 's1' : 's0';
  return `<div class="pillar-cell">
    <div class="pillar-letter">${letter}</div>
    <div class="pillar-score ${cls}">${s}</div>
    <div class="pillar-label">${label}</div>
  </div>`;
}

function renderBtRow(level, n, up, dn, currentLevel) {
  const isCurrent = level === currentLevel;
  return `<tr class="${isCurrent ? 'current' : ''}">
    <td>${isCurrent ? '▶ ' : ''}${level}</td>
    <td class="num">${n}</td>
    <td class="num">${up}</td>
    <td class="num">${dn}</td>
  </tr>`;
}

function goToTab(page) {
  document.querySelector(`.tab[data-page="${page}"]`).click();
}

// ──────────────────────────────────────────────────────────
// 설정 모달
// ──────────────────────────────────────────────────────────
document.getElementById('settings-btn').addEventListener('click', () => {
  const c = getConfig();
  document.getElementById('cfg-user').value = c.user;
  document.getElementById('cfg-repo').value = c.repo;
  document.getElementById('cfg-branch').value = c.branch;
  document.getElementById('settings-modal').classList.add('show');
});

function closeSettings() {
  document.getElementById('settings-modal').classList.remove('show');
}

function saveSettings() {
  const user = document.getElementById('cfg-user').value.trim() || DEFAULT_USER;
  const repo = document.getElementById('cfg-repo').value.trim() || DEFAULT_REPO;
  const branch = document.getElementById('cfg-branch').value.trim() || DEFAULT_BRANCH;
  localStorage.setItem('v12_user', user);
  localStorage.setItem('v12_repo', repo);
  localStorage.setItem('v12_branch', branch);
  closeSettings();
  fetchData();
}

document.getElementById('settings-modal').addEventListener('click', (e) => {
  if (e.target.id === 'settings-modal') closeSettings();
});

// ──────────────────────────────────────────────────────────
// 새로고침
// ──────────────────────────────────────────────────────────
document.getElementById('refresh-btn').addEventListener('click', () => {
  document.getElementById('refresh-btn').textContent = '⏳';
  fetchData().finally(() => {
    setTimeout(() => {
      document.getElementById('refresh-btn').textContent = '🔄';
    }, 500);
  });
});

// 풀다운 새로고침 (모바일)
let touchStartY = 0;
let pullDistance = 0;
document.addEventListener('touchstart', (e) => {
  if (window.scrollY === 0) touchStartY = e.touches[0].clientY;
});
document.addEventListener('touchmove', (e) => {
  if (window.scrollY === 0 && touchStartY > 0) {
    pullDistance = e.touches[0].clientY - touchStartY;
  }
});
document.addEventListener('touchend', () => {
  if (pullDistance > 100) {
    document.getElementById('refresh-btn').click();
  }
  touchStartY = 0; pullDistance = 0;
});

// ──────────────────────────────────────────────────────────
// PWA Service Worker — 자동 갱신 강화
// ──────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js').then((registration) => {
    // 1. 1시간마다 새 버전 체크
    setInterval(() => {
      registration.update().catch(() => {});
    }, 60 * 60 * 1000);
    
    // 2. 페이지 포커스 받을 때마다 체크 (앱 백그라운드 → 포그라운드)
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        registration.update().catch(() => {});
      }
    });
    
    // 3. 새 service-worker 발견 시 알림 배너
    registration.addEventListener('updatefound', () => {
      const newWorker = registration.installing;
      if (!newWorker) return;
      newWorker.addEventListener('statechange', () => {
        // 새 worker 설치 완료 + 기존 worker가 있음 (= 업데이트 발생)
        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
          showUpdateBanner(newWorker);
        }
      });
    });
  }).catch(() => {});
  
  // 4. service-worker가 활성화되면 페이지 새로고침
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (refreshing) return;
    refreshing = true;
    window.location.reload();
  });
}

function showUpdateBanner(newWorker) {
  const banner = document.getElementById('update-banner');
  if (!banner) return;
  banner.classList.add('show');
  
  document.getElementById('update-banner-btn').onclick = () => {
    // 새 worker에게 활성화 명령
    if (newWorker) newWorker.postMessage({ type: 'SKIP_WAITING' });
    banner.classList.remove('show');
  };
}

// 페이지 로드 시 메타태그에서 버전 자동 표시
(function showVersion() {
  const meta = document.querySelector('meta[name="app-version"]');
  if (meta) {
    const ver = meta.getAttribute('content');
    const el = document.getElementById('app-version-display');
    if (el && ver) el.textContent = 'v' + ver;
  }
})();

setInterval(fetchData, 5 * 60 * 1000);
